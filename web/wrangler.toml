"$schema" = "./node_modules/wrangler/config-schema.json"
main = ".open-next/worker.js"
name = "dinearound-web"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "dinearound-web"

[observability]
enabled = true

[vars]
NEXT_PUBLIC_API_URL = "https://dinearound-api.samisalehin.workers.dev"

# Custom domain (configure in dashboard or uncomment after DNS):
# routes = [
#   { pattern = "dinearound.salehinlabs.com/*", zone_name = "salehinlabs.com" }
# ]
